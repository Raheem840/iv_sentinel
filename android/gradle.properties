org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=384m -XX:ReservedCodeCacheSize=128m -XX:TieredStopAtLevel=1
# Kotlin's incremental compiler can't relativize paths across drive letters
# (project on D:, pub-cache plugin sources on C:) — disable it to avoid a
# hard crash; this only costs a slightly slower Kotlin compile, not app behavior.
kotlin.incremental=false
# This machine has ~7GB RAM total, often under 1GB free during normal use.
# Serialize work and skip the JIT's aggressive C2 tier (TieredStopAtLevel=1)
# to keep peak native memory low — a slower build that actually completes
# beats a fast one that OOM-crashes the daemon.
org.gradle.parallel=false
org.gradle.workers.max=1
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
